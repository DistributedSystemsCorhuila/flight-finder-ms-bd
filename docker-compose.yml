version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: flight-finder-postgres-${APP_ENV:-develop}
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flight_finder_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: flight-finder-app-${APP_ENV:-develop}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${APP_ENV:-develop}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-flight_finder_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres_data: