version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: flight-finder-postgres
    restart: always
    environment:
      POSTGRES_DB: flight_finder_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: