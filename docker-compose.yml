version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: flight-finder-postgres
    restart: always
    environment:
      POSTGRES_DB: flight_finder_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: flight-finder-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: flight_finder_db
      DB_USERNAME: postgres
      DB_PASSWORD: admin
    ports:
      - "8080:8080"

volumes:
  postgres_data: